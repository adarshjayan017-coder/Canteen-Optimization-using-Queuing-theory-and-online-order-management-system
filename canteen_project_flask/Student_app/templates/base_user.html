<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canteen System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="bg-light">

    <nav class="navbar navbar-light bg-white shadow-sm fixed-top px-3">
        <span class="navbar-brand fw-bold text-primary">CET CANTEEN APP</span>
        <a href="{{ url_for('menu.view_cart') }}" class="position-relative text-dark text-decoration-none">
            <i class="fas fa-shopping-cart fa-lg"></i>
            <span id="cart-badge" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">
                {{ cart_count if cart_count else 0 }}
            </span>
        </a>
    </nav>

    <div class="container mt-5 pt-4 pb-5 mb-5">
        {% block content %}{% endblock %}
    </div>

    <div class="fixed-bottom bg-white border-top shadow-lg d-flex justify-content-around py-2">
        <a href="{{ url_for('menu.menu_page') }}" class="nav-link text-center {% if request.endpoint == 'menu_page' %}text-primary{% else %}text-muted{% endif %}">
            <i class="fas fa-utensils d-block"></i><small>Menu</small>
        </a>
        <a href="{{ url_for('order.view_open_tokens') }}" class="nav-link text-center {% if request.endpoint == 'view_open_tokens' %}text-primary{% else %}text-muted{% endif %}">
            <i class="fas fa-ticket-alt d-block"></i><small>Tokens</small>
        </a>
        <a href="{{ url_for('profile.profile') }}" class="nav-link text-center {% if request.endpoint == 'profile' %}text-primary{% else %}text-muted{% endif %}">
            <i class="fas fa-user d-block"></i><small>Profile</small>
        </a>
        <a href="{{ url_for('auth.logout') }}" class="nav-link text-center text-danger">
            <i class="fas fa-sign-out-alt d-block"></i><small>Logout</small>
        </a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script type="module" src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
