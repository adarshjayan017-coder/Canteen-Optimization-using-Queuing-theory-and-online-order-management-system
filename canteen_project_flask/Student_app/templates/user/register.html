<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - CanteenHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="auth-body">

    <div class="auth-card text-center">
        <h2>Join Us</h2>
        <p class="text-muted mb-4">Create your student account</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
    {% for category, message in messages %}
      <div class="alert alert-{{ 'danger' if category == 'warning' else 'success' }} alert-dismissible fade show" role="alert">
        <i class="fas {{ 'fa-exclamation-triangle' if category == 'warning' else 'fa-check-circle' }} me-2"></i>
        {{ message }}
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
      </div>
    {% endfor %}
  {% endif %}
{% endwith %}

        <form action="{{ url_for('auth.register') }}" method="POST">
            <div class="mb-3 text-start">
                <label class="form-label small fw-bold">Username</label>
                <input type="text" name="username" class="form-control bg-light" placeholder="Choose a username" required>
            </div>

            <div class="mb-3 text-start">
                <label class="form-label small fw-bold">Email</label>
                <input type="email" name="email" class="form-control bg-light" placeholder="name@college.edu" required>
            </div>

            <div class="mb-4 text-start">
                <label class="form-label small fw-bold">Password</label>
                <input type="password" name="password" class="form-control bg-light" placeholder="Create a password" required>
            </div>

            <button type="submit" class="btn btn-primary w-100 btn-auth mb-3">Create Account</button>
        </form>

        <p class="small mb-0">Already a member? <a href="{{ url_for('auth.login') }}" class="text-decoration-none fw-bold">Login now</a></p>
    </div>

</body>
</html>
