{% extends "base_user.html" %}
{% block content %}
<div class="container py-4">
    <div class="card border-0 shadow-lg rounded-5 bg-primary text-white mb-4 overflow-hidden">
        <div class="card-body p-5 text-center position-relative" style="z-index: 1;">
            <div class="bg-white text-primary rounded-circle d-inline-flex align-items-center justify-content-center mb-3 shadow" style="width: 100px; height: 100px;">
                <h1 class="mb-0 fw-bold">{{ user.name[0] | upper }}</h1>
            </div>
            <h2 class="fw-bold mb-0">{{ user.name }}</h2>
            <p class="opacity-75">{{ user.email }}</p>
        </div>
    </div>

    <div class="row g-3">
        <div class="col-6">
            <a href="{{ url_for('profile.order_history') }}" class="card border-0 shadow-sm rounded-4 text-center py-4 text-decoration-none h-100">
                <i class="fas fa-receipt fa-2x text-primary mb-2"></i>
                <span class="fw-bold text-dark d-block">History</span>
            </a>
        </div>
        <div class="col-6">
            <a href="{{ url_for('menu.menu_page') }}" class="card border-0 shadow-sm rounded-4 text-center py-4 text-decoration-none h-100">
                <i class="fas fa-plus-circle fa-2x text-success mb-2"></i>
                <span class="fw-bold text-dark d-block">New Order</span>
            </a>
        </div>
    </div>

    <div class="mt-4">
        <a href="{{ url_for('auth.logout') }}" class="btn btn-outline-danger w-100 rounded-pill py-3 fw-bold">
            <i class="fas fa-sign-out-alt me-2"></i> Logout
        </a>
    </div>
</div>
{% endblock %}
